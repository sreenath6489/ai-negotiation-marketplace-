<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}BargainAI{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3eadf;
            color: #2b1d18;
        }

        .navbar {
            height: 80px;
            background: #f8efe4;
            border-bottom: 1px solid #e0d2c3;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #3a241c;
        }

        .nav-links a {
            margin: 0 18px;
            text-decoration: none;
            color: #5b463d;
            font-size: 18px;
        }

        .sell-btn {
            background: #4b2f24;
            color: white !important;
            padding: 12px 22px;
            border-radius: 25px;
            font-weight: bold;
        }

        .user-box {
            background: #efe3d4;
            padding: 10px 20px;
            border-radius: 30px;
            color: #3a241c;
            font-weight: bold;
        }

        .page-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }

        .main-card {
            background: #fffaf5;
            border: 1px solid #e1d4c7;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 45px rgba(63, 42, 31, 0.12);
        }

        .page-title {
            font-size: 42px;
            margin-bottom: 10px;
            color: #2b1d18;
        }

        .subtitle {
            color: #7b6a61;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 22px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: #f7efe7;
            padding: 26px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #eadbcc;
        }

        .stat-card h2 {
            font-size: 42px;
            margin: 0;
            color: #b8563c;
        }

        .stat-card p {
            color: #5b463d;
            font-size: 16px;
            font-weight: bold;
        }

        .section-card {
            background: #fff;
            border-radius: 22px;
            padding: 25px;
            margin-bottom: 28px;
            border: 1px solid #eadbcc;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .brown-btn {
            background: #b8563c;
            color: white;
            padding: 12px 22px;
            border-radius: 22px;
            text-decoration: none;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #4b2f24;
            color: white;
            padding: 14px;
            text-align: left;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #eadbcc;
        }

        .badge {
            padding: 7px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
        }

        .accepted {
            background: #dcfce7;
            color: #15803d;
        }

        .active {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .pending {
            background: #fef3c7;
            color: #92400e;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">👍 BargainAI</div>

    <div class="nav-links">
        <a href="/">Marketplace</a>
        <a href="/api/dashboard/negotiations-page/">My Negotiations</a>
        <a class="sell-btn" href="/api/dashboard/seller-page/">+ Sell Item</a>
    </div>

    <div class="user-box">
        {{ request.user.username }}
    </div>
</div>

<div class="page-container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
