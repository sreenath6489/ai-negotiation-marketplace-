{% extends 'dashboard/base.html' %}

{% block title %}Sell an Item{% endblock %}

{% block content %}

<div class="main-card" style="max-width: 760px; margin: 0 auto;">
    <h1 class="page-title">Sell an Item</h1>
    <p class="subtitle">List your goods and let your AI agent handle incoming negotiations.</p>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label><b>Item Title</b></label>
        <input type="text" name="name" placeholder="e.g. iPhone 15 Pro Max - 256GB - Unlocked"
               style="width:100%; padding:18px; margin:10px 0 25px; border:0; border-radius:14px; background:#f3eadf; font-size:18px;">

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:25px;">
            <div>
                <label><b>Category</b></label>
                <select name="category"
                        style="width:100%; padding:18px; margin:10px 0 25px; border:0; border-radius:14px; background:#f3eadf; font-size:18px;">
                    <option>Electronics</option>
                    <option>Mobiles</option>
                    <option>Fashion</option>
                    <option>Books</option>
                    <option>Furniture</option>
                </select>
            </div>

            <div>
                <label><b>Quoted Price (₹)</b></label>
                <input type="number" name="price" placeholder="45000"
                       style="width:100%; padding:18px; margin:10px 0 25px; border:0; border-radius:14px; background:#f3eadf; font-size:18px;">
            </div>
        </div>

        <label><b>Upload Product Photo</b></label>
        <div style="border:2px dashed #e0d2c3; border-radius:18px; padding:45px; text-align:center; margin:10px 0 25px;">
            <div style="font-size:35px;">📸</div>
            <p><b>Click to upload local photo</b></p>
            <input type="file" name="image">
            <p style="color:#7b6a61;">Supports JPG, PNG up to 5MB</p>
        </div>

        <label><b>Detailed Description</b></label>
        <textarea name="description" rows="5"
                  placeholder="Provide information about the condition, accessories, age, usage, and any other details that can help negotiate."
                  style="width:100%; padding:18px; margin:10px 0 30px; border:0; border-radius:14px; background:#f3eadf; font-size:18px;"></textarea>

        <div style="display:grid; grid-template-columns:1fr 1.8fr; gap:20px;">
            <a href="/" style="text-align:center; padding:16px; border:1px solid #b8563c; color:#b8563c; border-radius:24px; text-decoration:none; font-weight:bold;">
                Cancel
            </a>

            <button type="submit"
                    style="background:#b8563c; color:white; padding:16px; border:0; border-radius:24px; font-size:18px; font-weight:bold;">
                Publish Listing
            </button>
        </div>
    </form>
</div>

{% endblock %}
