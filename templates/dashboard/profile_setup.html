{% extends 'dashboard/base.html' %}

{% block title %}Complete Your Profile{% endblock %}

{% block content %}

<div style="max-width:650px;margin:40px auto;background:white;padding:35px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.1);">

    <h1 style="text-align:center;color:#8B4513;">
        Complete Your Seller Profile
    </h1>

    <p style="text-align:center;color:#666;margin-bottom:30px;">
        Before publishing your first product, please provide your contact details.
    </p>

    <form method="POST">
        {% csrf_token %}

        <label><b>Phone Number</b></label>
        <input
            type="text"
            name="phone"
            value="{{ request.user.phone }}"
            required
            style="width:100%;padding:12px;margin:10px 0 20px;border:1px solid #ccc;border-radius:8px;"
        >

        <label><b>Location</b></label>
        <input
            type="text"
            name="location"
            value="{{ request.user.location }}"
            required
            placeholder="Ex: Hyderabad, Telangana"
            style="width:100%;padding:12px;margin:10px 0 25px;border:1px solid #ccc;border-radius:8px;"
        >

        <button
            type="submit"
            style="width:100%;padding:14px;background:#8B4513;color:white;border:none;border-radius:8px;font-size:18px;cursor:pointer;">
            Save & Continue
        </button>

    </form>

</div>

{% endblock %}
