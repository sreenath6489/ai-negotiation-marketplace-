<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BargainAI{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f6efe8;
            font-family:Arial, Helvetica, sans-serif;
        }

        .navbar{
            background:#efe4d7;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .navbar-brand{
            font-size:30px;
            font-weight:bold;
            color:#4e342e;
        }

        .main-card{
            background:white;
            border-radius:20px;
            padding:30px;
            margin-top:40px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        .btn-main{
            background:#5d4037;
            color:white;
            border:none;
            border-radius:30px;
            padding:10px 25px;
        }

        .btn-main:hover{
            background:#3e2723;
            color:white;
        }
    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">👍 BargainAI</a>
    </div>
</nav>

<div class="container">

{% block content %}

{% endblock %}

</div>

</body>
</html>
