<!DOCTYPE html>
<html>
<head>
    <title>Sales History</title>
</head>
<body>

<h2>Sales History</h2>

<table border="1">
    <tr>
        <th>Customer Name</th>
        <th>Product Name</th>
        <th>Quantity</th>
        <th>Total Amount</th>
        <th>Status</th>
    </tr>

    {% for order in orders %}
    <tr>
        <td>{{ order.customer_name }}</td>
        <td>{{ order.product_name }}</td>
        <td>{{ order.quantity }}</td>
        <td>₹{{ order.total_amount }}</td>
        <td>{{ order.status }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5">No sales found.</td>
    </tr>
    {% endfor %}
</table>

<br>

<a href="/">Back to Checkout</a>

</body>
</html>
