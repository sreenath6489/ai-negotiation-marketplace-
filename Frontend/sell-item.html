<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sell Item - BargainAI</title>
<link rel="stylesheet" href="sell-item.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">🤝 BargainAI</div>

    <div class="nav-links">
        <a href="#">Marketplace</a>
        <a href="#">My Negotiations</a>

        <a href="#">+ Sell Item</a>

        <a href="dashboard.html" class="back-btn">Back</a>

        
        <button class="logout-btn">Sign Out</button>
    </div>
</nav>

<div class="container">

    <div class="card">

        <h1>Sell an Item</h1>

        <p class="subtitle">
            List your goods and let your AI agent handle incoming negotiations.
        </p>

        <form id="sellItemForm">
            <label>Item Title</label>
            <input type="text" id="title" required>

            <div class="row">

                <div class="field">
                    <label>Category</label>

                    <select id="category">
                        <option>Electronics</option>
                        <option>Furniture</option>
                        <option>Fashion</option>
                        <option>Vehicles</option>
                        <option>Home Goods</option>
                        <option>Sports</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="field">
                    <label>Quoted Price (₹)</label>
                    <input type="number" id="price" required>
                </div>

            </div>

            <label>Upload Product Photo</label>

            <div class="upload-box" id="uploadBox">
                <input type="file" id="imageInput" accept=".jpg,.jpeg,.png" style="display:none;">
                <div id="uploadPrompt" style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%;">
                    <div class="upload-icon">📸</div>
                    <h4>Click to upload local photo</h4>
                    <p>Supports JPG, PNG up to 5MB</p>
                </div>
                <img id="imagePreview" style="display:none; max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; padding: 10px; pointer-events: none;">
            </div>
            <div id="uploadError" style="color: #b6493c; font-size: 13px; margin-top: 8px; display: none; font-weight: 500;"></div>

            <label>Detailed Description</label>

            <textarea id="description" placeholder="Provide information about the condition, accessories, age, usage, and any other details that can help negotiate."></textarea>

            <button type="button" class="submit-btn" onclick="window.location.href='dashboard.html'">
                Cancel
            </button>

            <button type="submit" class="submit-btn">
                Publish Listing
            </button>
        </form>

    </div>

</div>


<script>
    const uploadBox = document.getElementById('uploadBox');
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const uploadPrompt = document.getElementById('uploadPrompt');
    const uploadError = document.getElementById('uploadError');

    // Trigger file picker click
    uploadBox.addEventListener('click', () => {
        imageInput.click();
    });

    // Support drag and drop files
    uploadBox.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadBox.style.borderColor = '#b6493c';
    });

    uploadBox.addEventListener('dragleave', () => {
        uploadBox.style.borderColor = '#ddd';
    });

    uploadBox.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadBox.style.borderColor = '#ddd';
        if (e.dataTransfer.files.length > 0) {
            imageInput.files = e.dataTransfer.files;
            handleFileSelect(imageInput.files[0]);
        }
    });

    // Handle file selection
    imageInput.addEventListener('change', () => {
        if (imageInput.files.length > 0) {
            handleFileSelect(imageInput.files[0]);
        }
    });

    function handleFileSelect(file) {
        // Reset preview and error
        imagePreview.style.display = 'none';
        imagePreview.src = '';
        uploadPrompt.style.display = 'flex';
        uploadError.style.display = 'none';
        uploadError.textContent = '';

        if (!file) return;

        // Size check (5MB limit)
        const maxSize = 5 * 1024 * 1024;
        if (file.size > maxSize) {
            showError("File size exceeds 5MB. Please choose a smaller image.");
            imageInput.value = '';
            return;
        }

        // File type check
        const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png'];
        if (!allowedTypes.includes(file.type)) {
            showError("Only JPG, JPEG, and PNG images are supported.");
            imageInput.value = '';
            return;
        }

        // Generate and show preview
        const reader = new FileReader();
        reader.onload = (e) => {
            imagePreview.src = e.target.result;
            imagePreview.style.display = 'block';
            uploadPrompt.style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    function showError(message) {
        uploadError.textContent = message;
        uploadError.style.display = 'block';
    }

    // Submit form
    document.getElementById('sellItemForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const title = document.getElementById('title').value;
        const category = document.getElementById('category').value;
        const price = document.getElementById('price').value;
        const description = document.getElementById('description').value;
        const file = imageInput.files[0];

        // Primary: Multipart/FormData upload
        const formData = new FormData();
        formData.append('title', title);
        formData.append('category', category);
        formData.append('price', price);
        formData.append('description', description);
        if (file) {
            formData.append('image', file);
        }

        try {
            const response = await fetch('http://localhost:5000/api/sell-item', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            if (response.ok) {
                alert('Listing published successfully!');
                window.location.href = 'dashboard.html';
            } else {
                alert('Error: ' + (data.error || 'Failed to publish listing.'));
            }
        } catch (err) {
            console.warn('Multipart upload failed or not supported. Falling back to JSON/Base64...', err);
            
            // Fallback: JSON upload with base64 image encoding
            if (file) {
                const base64Reader = new FileReader();
                base64Reader.onload = async (event) => {
                    await submitAsJson(title, category, price, description, event.target.result);
                };
                base64Reader.readAsDataURL(file);
            } else {
                await submitAsJson(title, category, price, description, null);
            }
        }
    });

    async function submitAsJson(title, category, price, description, base64Image) {
        try {
            const response = await fetch('http://localhost:5000/api/sell-item', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    title,
                    category,
                    price,
                    description,
                    image: base64Image
                })
            });

            const data = await response.json();
            if (response.ok) {
                alert('Listing published successfully!');
                window.location.href = 'dashboard.html';
            } else {
                alert('Error: ' + (data.error || 'Failed to publish listing.'));
            }
        } catch (err) {
            console.error(err);
            alert('Could not connect to the backend server. Make sure node server.js is running.');
        }
    }
</script>

</body>
</html>
