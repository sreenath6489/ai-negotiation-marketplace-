<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sell Item - BargainAI</title>
<link rel="stylesheet" href="sell-item.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">🤝 BargainAI</div>

    <div class="nav-links">
        <a href="#">Marketplace</a>
        <a href="#">My Negotiations</a>

        <a href="#">+ Sell Item</a>

        <a href="dashboard.html" class="back-btn">Back</a>

        
        <button class="logout-btn">Sign Out</button>
    </div>
</nav>

<div class="container">

    <div class="card">

        <h1>Sell an Item</h1>

        <p class="subtitle">
            List your goods and let your AI agent handle incoming negotiations.
        </p>

        <form id="sellItemForm">
            <label>Item Title</label>
            <input type="text" id="title" required>

            <div class="row">

                <div class="field">
                    <label>Category</label>

                    <select id="category">
                        <option>Electronics</option>
                        <option>Furniture</option>
                        <option>Fashion</option>
                        <option>Vehicles</option>
                        <option>Home Goods</option>
                        <option>Sports</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="field">
                    <label>Quoted Price (₹)</label>
                    <input type="number" id="price" required>
                </div>

            </div>

            <label>Upload Product Photo</label>

            <div class="upload-box">
                <div class="upload-icon">📸</div>
                <h4>Click to upload local photo</h4>
                <p>Supports JPG, PNG up to 5MB</p>
            </div>

            <label>Detailed Description</label>

            <textarea id="description" placeholder="Provide information about the condition, accessories, age, usage, and any other details that can help negotiate."></textarea>

            <button type="button" class="submit-btn" onclick="window.location.href='dashboard.html'">
                Cancel
            </button>

            <button type="submit" class="submit-btn">
                Publish Listing
            </button>
        </form>

    </div>

</div>

<script>
    document.getElementById('sellItemForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('title').value;
        const category = document.getElementById('category').value;
        const price = document.getElementById('price').value;
        const description = document.getElementById('description').value;

        try {
            const response = await fetch('http://localhost:5000/api/sell-item', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title, category, price, description })
            });

            const data = await response.json();
            if (response.ok) {
                alert('Listing published successfully!');
                window.location.href = 'dashboard.html';
            } else {
                alert('Error: ' + (data.error || 'Failed to publish listing.'));
            }
        } catch (err) {
            console.error(err);
            alert('Could not connect to the backend server. Make sure node server.js is running.');
        }
    });
</script>

</body>
</html>
